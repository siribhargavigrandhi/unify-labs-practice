<!DOCTYPE html>
<html>
<head>

<title>Shop Manager Inventory Control</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Inventory Control System</h1>

<thead>

<tr>

<th>Category</th>

<th>Stock</th>

<th>Tags</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

<script src="script.js"></script>
